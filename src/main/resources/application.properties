spring.application.name=auth-service

# Database Configuration (Using Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate (Use 'validate' for production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration (Render assigns the PORT)
server.port=${PORT:8080}

# JWT Secret and Expiration configurations
sgsits.app.jwtSecret=${JWT_SECRET}
sgsits.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Eureka Client Configuration   
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Cloud-friendly registration
# Prefer IP address to ensure other services can reach this instance
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}
eureka.instance.non-secure-port=${PORT:8080}

# Actuator (Required for Eureka health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always